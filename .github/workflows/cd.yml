name: CD

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:
    inputs:
      deploy:
        description: Trigger deploy webhook after publishing image
        required: false
        default: "false"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish summary
        run: |
          echo "Published image tags:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  deploy_azure:
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Container App registry credentials (optional)
        if: ${{ secrets.GHCR_PULL_USERNAME != '' && secrets.GHCR_PULL_TOKEN != '' }}
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade --allow-preview true
            az containerapp registry set \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --server ghcr.io \
              --username "${{ secrets.GHCR_PULL_USERNAME }}" \
              --password "${{ secrets.GHCR_PULL_TOKEN }}"

      - name: Deploy image to Azure Container App
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade --allow-preview true
            az containerapp update \
              --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --image "$IMAGE_REF"

      - name: Publish deploy summary
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
        run: |
          echo "Azure deploy completed" >> "$GITHUB_STEP_SUMMARY"
          echo "Container App: ${{ secrets.AZURE_CONTAINER_APP_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Resource Group: ${{ secrets.AZURE_RESOURCE_GROUP }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: $IMAGE_REF" >> "$GITHUB_STEP_SUMMARY"
