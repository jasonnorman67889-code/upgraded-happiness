name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sovereign_soar
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node project
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip note when no package.json
        if: steps.detect.outputs.present != 'true'
        run: echo "No package.json found in repository root; skipping Node runtime checks."

      - name: Setup Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Start API and worker
        if: steps.detect.outputs.present == 'true'
        env:
          REDIS_URL: redis://127.0.0.1:6379
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/sovereign_soar
          JWT_MODE: disabled
        run: |
          nohup npm run start > api.log 2>&1 &
          echo $! > api.pid
          nohup npm run start:worker > worker.log 2>&1 &
          echo $! > worker.pid

      - name: Wait for API health
        if: steps.detect.outputs.present == 'true'
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run test suite
        if: steps.detect.outputs.present == 'true'
        env:
          SOAR_BASE_URL: http://127.0.0.1:3000
          SOAR_AUDIT_LIMIT: 2
        run: npm run test:ci

      - name: Print process logs on failure
        if: failure()
        run: |
          echo "--- api.log ---"
          cat api.log || true
          echo "--- worker.log ---"
          cat worker.log || true

      - name: Stop background processes
        if: always()
        run: |
          if [ -f api.pid ]; then kill $(cat api.pid) || true; fi
          if [ -f worker.pid ]; then kill $(cat worker.pid) || true; fi
