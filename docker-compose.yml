services:
  redis:
    image: redis:7-alpine
    container_name: sovereign-soar-redis
    ports:
      - "6380:6379"

  postgres:
    image: postgres:16-alpine
    container_name: sovereign-soar-postgres
    environment:
      POSTGRES_DB: sovereign_soar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"

  api:
    build: .
    container_name: sovereign-soar-api
    command: ["node", "src/api.js"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sovereign_soar
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres

  worker:
    build: .
    container_name: sovereign-soar-worker
    command: ["node", "src/worker.js"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sovereign_soar
    depends_on:
      - redis
      - postgres
